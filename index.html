<!DOCTYPE html>
<html>
<head>
  <title>Foot Scanner</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* Camera container */
    .camera-container {
      position: relative;
      width: 300px;
      margin: auto;
    }

    video, canvas {
      width: 100%;
      border-radius: 10px;
    }

    canvas {
      display: none;
    }

    /* Buttons */
    .controls {
      margin-top: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }

    #captureBtn {
      background: #ff4d4d;
      color: white;
    }

    #retakeBtn {
      background: #555;
      color: white;
      display: none;
    }
  </style>
</head>

<body>

  <h1>👟 Foot Scanner</h1>

  <div class="camera-container">
    <video id="video" autoplay></video>
    <canvas id="canvas" width="300" height="400"></canvas>
  </div>

  <div class="controls">
    <button id="captureBtn">📸 Capture</button>
    <button id="retakeBtn">🔄 Retake</button>
  </div>

  <!-- OpenCV -->
  <script>
    var Module = {
      onRuntimeInitialized() {
        console.log("✅ OpenCV loaded");
        window.cvReady = true;
      }
    };
  </script>

  <script src="https://docs.opencv.org/4.x/opencv.js"></script>

  <!-- Your JS files -->
  <script src="assets/js/camera.js"></script>
  <script src="assets/js/imageProcessor.js"></script>
  <script src="assets/js/main.js"></script>

</body>
</html>
