<!DOCTYPE html>
<html>
<head>
  <title>Foot Scanner</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial;
      text-align: center;
      background: black;
      color: white;
    }

    .camera-container {
      position: relative;
      width: 300px;
      margin: auto;
      overflow: hidden;
      border-radius: 10px;
    }

    video {
      width: 100%;
    }

    /* Message */
    .message {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 16px;
    }

    /* Scanning line */
    .scan-line {
      position: absolute;
      width: 100%;
      height: 3px;
      background: red;
      animation: scan 2s linear infinite;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }

    /* Result box */
    .result {
      margin-top: 20px;
      font-size: 20px;
      display: none;
    }
  </style>
</head>

<body>

  <h2>👣 Foot Scanner</h2>

  <div class="camera-container">
    <video id="video" autoplay playsinline></video>

    <div class="message" id="msg">Scanning Foot...</div>
    <div class="scan-line"></div>
  </div>

  <div class="result" id="result">
    ✅ Scan Complete! <br>
    Foot Size: 9 (Example)
  </div>

  <script>
    const video = document.getElementById("video");
    const msg = document.getElementById("msg");
    const result = document.getElementById("result");

    // Open camera
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(() => {
        alert("Camera permission denied ❌");
      });

    // Fake scanning process
    setTimeout(() => {
      msg.innerText = "Analyzing...";
    }, 2000);

    setTimeout(() => {
      msg.innerText = "Processing...";
    }, 4000);

    setTimeout(() => {
      msg.style.display = "none";
      document.querySelector(".scan-line").style.display = "none";
      result.style.display = "block";
    }, 6000);
  </script>

</body>
</html>
