<!DOCTYPE html>
<html>
<head>
  <title>Scanner</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial;
      text-align: center;
      background: black;
      color: white;
    }

    .camera-container {
      position: relative;
      width: 300px;
      margin: auto;
      overflow: hidden;
      border-radius: 10px;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    /* Message */
    .message {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 16px;
    }

    /* Scanning line */
    .scan-line {
      position: absolute;
      width: 100%;
      height: 3px;
      background: red;
      animation: scan 2s linear infinite;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }

    /* Result */
    .result {
      margin-top: 20px;
      font-size: 18px;
      display: none;
      padding: 15px;
      background: #111;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h2>📷 Scanner</h2>

  <div class="camera-container">
    <video id="video" autoplay playsinline></video>

    <div class="message" id="msg">Starting Camera...</div>
    <div class="scan-line" id="scanLine"></div>
  </div>

  <div class="result" id="result">
    ⚠️ Shopify does not allow this feature.
  </div>

  <script>
    const video = document.getElementById("video");
    const msg = document.getElementById("msg");
    const result = document.getElementById("result");
    const scanLine = document.getElementById("scanLine");

    // Open BACK camera
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    })
    .then(stream => {
      video.srcObject = stream;
      msg.innerText = "Scanning...";
    })
    .catch(() => {
      alert("Camera permission denied ❌");
    });

    // Fake scanning steps
    setTimeout(() => {
      msg.innerText = "Analyzing...";
    }, 2000);

    setTimeout(() => {
      msg.innerText = "Processing...";
    }, 4000);

    setTimeout(() => {
      msg.style.display = "none";
      scanLine.style.display = "none";
      result.style.display = "block";
    }, 6000);
  </script>

</body>
</html>
